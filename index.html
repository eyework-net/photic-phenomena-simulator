<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Photic Phenomena Simulator v1.1</title><style>body{margin:0;font-family:Arial,sans-serif;background:#101214;color:#fff;display:flex;height:100vh}#view{flex:1;display:flex;align-items:center;justify-content:center;background:#1a1d21}canvas{max-width:100%;max-height:100%}#panel{width:380px;padding:18px;overflow:auto;background:#121417}label{display:block;margin-top:12px;font-size:14px}input,select{width:100%;padding:8px;margin-top:4px;box-sizing:border-box}input[type=range]{padding:0}button{width:100%;padding:10px;margin-top:10px;border:0;border-radius:8px;background:#0ea5e9;color:#fff;font-weight:bold;cursor:pointer}.muted{color:#9ca3af;font-size:12px}</style></head><body><div id='view'><canvas id='cv' width='960' height='720'></canvas></div><div id='panel'><h2>Photic Phenomena Simulator v1.1</h2><div class='muted'>Research-ready edition</div><label>Patient ID<input id='pid'></label><label>Examiner<input id='exam'></label><label>Mode<select id='mode' onchange='draw()'><option value='day'>Day</option><option value='night' selected>Night</option></select></label><label>Halo Size <span id='hv'></span><input id='halo' type='range' min='0' max='100' value='40' oninput='draw()'></label><label>Halo Density <span id='hdv'></span><input id='halod' type='range' min='0' max='100' value='60' oninput='draw()'></label><label>Glare Size <span id='gv'></span><input id='glare' type='range' min='0' max='100' value='35' oninput='draw()'></label><label>Glare Density <span id='gdv'></span><input id='glared' type='range' min='0' max='100' value='60' oninput='draw()'></label><label>Starburst Size <span id='sv'></span><input id='star' type='range' min='0' max='100' value='45' oninput='draw()'></label><label>Starburst Density <span id='sdv'></span><input id='stard' type='range' min='0' max='100' value='60' oninput='draw()'></label><label>Comments<textarea id='note' style='width:100%;height:80px'></textarea></label><button onclick='savePNG()'>Save PNG</button><button onclick='saveCSV()'>Export CSV</button><div class='muted'>Timestamp and metadata included in CSV export.</div></div><script>const c=document.getElementById('cv'),x=c.getContext('2d');function rng(n){let s=n;return ()=>{s=(s*1664525+1013904223)%4294967296;return s/4294967296}}function draw(){let h=+halo.value,g=+glare.value,s=+star.value,hd=+halod.value,gd=+glared.value,sd=+stard.value;hv.textContent=h;gv.textContent=g;sv.textContent=s;hdv.textContent=hd;gdv.textContent=gd;sdv.textContent=sd;let modev=mode.value;let bg=modev==='day'?'#aeb4bc':'#000';x.fillStyle=bg;x.fillRect(0,0,c.width,c.height);let cx=c.width/2,cy=c.height/2;if(g>0){let rg=x.createRadialGradient(cx,cy,0,cx,cy,10+g*3);rg.addColorStop(0,'rgba(255,255,255,'+((gd/100)*0.9)+')');rg.addColorStop(.25,'rgba(255,255,255,'+((gd/100)*0.45)+')');rg.addColorStop(1,'rgba(255,255,255,0)');x.fillStyle=rg;x.beginPath();x.arc(cx,cy,10+g*3,0,6.29);x.fill();}let r=rng(100+s);if(s>0){for(let i=0;i<8+s/3;i++){let a=i*6.283/(8+s/3),len=40+s*5*(.4+r());let lg=x.createLinearGradient(cx,cy,cx+Math.cos(a)*len,cy+Math.sin(a)*len);lg.addColorStop(0,'rgba(255,255,255,'+((sd/100)*0.95)+')');lg.addColorStop(1,'rgba(255,255,255,0)');x.strokeStyle=lg;x.lineWidth=.5+r();x.beginPath();x.moveTo(cx,cy);x.lineTo(cx+Math.cos(a)*len,cy+Math.sin(a)*len);x.stroke()}}if(h>0){let rr=20+h*3;let gr=x.createRadialGradient(cx,cy,rr-10,cx,cy,rr+10);gr.addColorStop(0,'rgba(255,255,255,0)');gr.addColorStop(.5,'rgba(180,220,255,'+((hd/100)*0.9)+')');gr.addColorStop(1,'rgba(255,255,255,0)');x.fillStyle=gr;x.beginPath();x.arc(cx,cy,rr+12,0,6.29);x.fill();}x.fillStyle='#fff';x.beginPath();x.arc(cx,cy,6,0,6.29);x.fill()}function savePNG(){let a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='photic_simulator_v1_1.png';a.click()}function saveCSV(){let now=new Date().toISOString();let rows=[['timestamp',now],['patient_id',pid.value],['examiner',exam.value],['mode',mode.value],['halo',halo.value],['glare',glare.value],['starburst',star.value],['halo_density',halod.value],['glare_density',glared.value],['starburst_density',stard.value],['comments',note.value.replace(/\n/g,' ')]];let txt=rows.map(r=>r.join(',')).join('\n');let b=new Blob([txt],{type:'text/csv'});let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='photic_research_data.csv';a.click()}draw();</script></body></html>
